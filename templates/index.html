<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>musichero.ai Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0b0b14;
      --surface: #131324;
      --card:    #18182e;
      --border:  #252540;
      --accent:  #7c3aed;
      --accent2: #a855f7;
      --green:   #22c55e;
      --red:     #ef4444;
      --yellow:  #f59e0b;
      --blue:    #60a5fa;
      --text:    #e2e8f0;
      --muted:   #8b8ba8;
      --r:       12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #160830 0%, #0b0b14 65%);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .logo {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    header h1 { font-size: 19px; font-weight: 700; }
    header p  { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 22px;
      max-width: 1160px;
      margin: 26px auto;
      padding: 0 22px;
    }
    @media (max-width: 820px) { .layout { grid-template-columns: 1fr; } }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 22px;
    }
    .card-title {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.2px;
      color: var(--muted); margin-bottom: 18px;
    }

    /* ── Form ── */
    label {
      display: block; font-size: 13px;
      color: var(--muted); margin-bottom: 6px; margin-top: 16px;
    }
    label:first-of-type { margin-top: 0; }

    input[type="text"], textarea {
      width: 100%;
      background: #0e0e20;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      padding: 10px 12px;
      outline: none;
      resize: vertical;
      transition: border-color .2s;
    }
    input[type="text"]:focus,
    textarea:focus { border-color: var(--accent2); }
    textarea { min-height: 80px; }
    #lyricsInput { min-height: 120px; font-family: monospace; font-size: 13px; }

    /* Mode toggle */
    .mode-tabs {
      display: flex;
      background: #0e0e20;
      border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden;
    }
    .mode-tabs button {
      flex: 1; border: none; background: none;
      color: var(--muted); font-size: 14px; padding: 9px;
      cursor: pointer; transition: background .15s, color .15s;
    }
    .mode-tabs button.active { background: var(--accent); color: #fff; }

    /* Auto-captcha info bar */
    .auto-badge {
      display: flex; align-items: center; gap: 8px;
      background: #0f1a0f;
      border: 1px solid #1a3a1a;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px; color: var(--green);
      margin-top: 18px;
    }
    .auto-badge .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green);
      animation: pulse 1.8s infinite;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .35; }
    }

    /* Generate button */
    #generateBtn {
      width: 100%; margin-top: 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 10px;
      color: #fff; font-size: 16px; font-weight: 700;
      padding: 13px; cursor: pointer;
      transition: opacity .2s, transform .1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    #generateBtn:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); }
    #generateBtn:disabled { opacity: .45; cursor: not-allowed; transform: none; }

    /* ── Jobs panel ── */
    .jobs-empty {
      text-align: center; padding: 60px 20px;
      color: var(--muted); font-size: 14px;
    }
    .jobs-empty .icon { font-size: 48px; display: block; margin-bottom: 12px; }

    .job-item {
      background: #0e0e20;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
      margin-bottom: 14px;
      transition: border-color .3s;
    }
    .job-item.status-ok      { border-color: #1a3a1a; }
    .job-item.status-error,
    .job-item.status-failed  { border-color: #3a1a1a; }

    .job-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 12px;
    }
    .job-title { font-weight: 600; font-size: 14px; word-break: break-word; }
    .job-meta  { font-size: 12px; color: var(--muted); margin-top: 3px; }

    .status-badge {
      font-size: 11px; font-weight: 700; padding: 3px 10px;
      border-radius: 20px; text-transform: uppercase; letter-spacing: .5px;
      flex-shrink: 0; margin-left: 10px;
    }
    .badge-queued  { background: #1e2a1e; color: var(--yellow); }
    .badge-running { background: #1a2035; color: var(--blue); }
    .badge-ok      { background: #1a3a1a; color: var(--green); }
    .badge-failed,
    .badge-error   { background: #3a1a1a; color: var(--red); }
    .badge-timeout { background: #2a2a10; color: var(--yellow); }

    /* Progress steps */
    .progress-steps {
      display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap;
    }
    .step-pill {
      font-size: 11px; padding: 3px 10px; border-radius: 20px;
      background: #1a1a30; color: var(--muted); border: 1px solid var(--border);
      transition: all .3s;
    }
    .step-pill.active  { background: #1a2035; color: var(--blue); border-color: var(--blue); }
    .step-pill.done    { background: #1a3a1a; color: var(--green); border-color: #1a4a1a; }
    .step-pill.failed  { background: #3a1a1a; color: var(--red); border-color: #4a1a1a; }

    /* Log terminal */
    .log-box {
      background: #06060e;
      border: 1px solid #1a1a30;
      border-radius: 7px;
      padding: 10px 12px;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 12px; color: var(--muted);
      max-height: 180px; overflow-y: auto;
      line-height: 1.65;
    }
    .log-line { white-space: pre-wrap; word-break: break-all; }
    .log-captcha { color: #c084fc; }
    .log-poll    { color: var(--blue); }
    .log-create  { color: #fcd34d; }
    .log-ok      { color: var(--green); font-weight: 600; }
    .log-error   { color: var(--red); }

    /* Audio result */
    .audio-wrap {
      margin-top: 14px;
      background: #0a160a;
      border: 1px solid #1a3a1a;
      border-radius: 8px;
      padding: 14px;
    }
    .audio-wrap .ready-label {
      font-size: 13px; color: var(--green); font-weight: 600;
      margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
    }
    audio { width: 100%; border-radius: 6px; margin-top: 6px; }
    .audio-url {
      display: inline-block; margin-top: 8px;
      font-size: 11px; color: #a5b4fc; word-break: break-all;
      text-decoration: none;
    }
    .audio-url:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <div class="logo">🎵</div>
  <div>
    <h1>musichero.ai Generator</h1>
    <p>Generate AI music — captcha &amp; API fully automated</p>
  </div>
</header>

<div class="layout">

  <!-- ═══ LEFT: FORM ═══ -->
  <div>
    <div class="card">
      <div class="card-title">Song Settings</div>

      <label>Mode</label>
      <div class="mode-tabs">
        <button id="btnSimple" class="active" onclick="setMode('simple')">Simple</button>
        <button id="btnCustom" onclick="setMode('custom')">Custom</button>
      </div>

      <label for="promptInput">Style / Mood</label>
      <textarea id="promptInput"
        placeholder="e.g. Upbeat electronic pop with dreamy synths and female vocals"></textarea>

      <div id="customFields" style="display:none">
        <label for="titleInput">Song Title</label>
        <input type="text" id="titleInput" placeholder="My Song" />

        <label for="lyricsInput">Lyrics</label>
        <textarea id="lyricsInput"
          placeholder="[Verse 1]&#10;Your lyrics here...&#10;&#10;[Chorus]&#10;..."></textarea>
      </div>

      <div class="auto-badge">
        <div class="dot"></div>
        Captcha is solved automatically in the background
      </div>

      <button id="generateBtn" onclick="generate()">
        ✨ Generate Song
      </button>
    </div>
  </div>

  <!-- ═══ RIGHT: JOBS ═══ -->
  <div>
    <div class="card" style="min-height: 320px;">
      <div class="card-title">Generation Jobs</div>
      <div id="jobsWrap">
        <div class="jobs-empty">
          <span class="icon">🎶</span>
          No jobs yet — enter your song details and click <strong>Generate Song</strong>.
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  let mode = 'simple';

  function setMode(m) {
    mode = m;
    document.getElementById('btnSimple').classList.toggle('active', m === 'simple');
    document.getElementById('btnCustom').classList.toggle('active', m === 'custom');
    document.getElementById('customFields').style.display = m === 'custom' ? 'block' : 'none';
  }

  async function generate() {
    const prompt = document.getElementById('promptInput').value.trim();
    if (!prompt) { alert('Please enter a style / mood description.'); return; }

    const btn = document.getElementById('generateBtn');
    btn.disabled = true;
    btn.textContent = 'Starting...';

    const body = {
      mode,
      prompt,
      title:  document.getElementById('titleInput').value.trim() || 'Untitled',
      lyrics: document.getElementById('lyricsInput').value.trim(),
    };

    try {
      const resp = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await resp.json();
      if (!resp.ok) { alert('Error: ' + (data.error || resp.statusText)); return; }
      addJobCard(data.job_id, body);
    } catch (err) {
      alert('Request failed: ' + err.message);
    } finally {
      btn.disabled = false;
      btn.innerHTML = '✨ Generate Song';
    }
  }

  // ── Job card ──────────────────────────────────────────────
  function addJobCard(id, body) {
    const wrap = document.getElementById('jobsWrap');
    const empty = wrap.querySelector('.jobs-empty');
    if (empty) empty.remove();

    const label = body.mode === 'custom'
      ? (body.title || 'Custom Song')
      : body.prompt.slice(0, 60);

    const el = document.createElement('div');
    el.className = 'job-item';
    el.id = 'job-' + id;
    el.innerHTML = `
      <div class="job-header">
        <div>
          <div class="job-title">${esc(label)}</div>
          <div class="job-meta">Mode: ${body.mode} &nbsp;·&nbsp; ${new Date().toLocaleTimeString()}</div>
        </div>
        <span class="status-badge badge-queued" id="badge-${id}">Queued</span>
      </div>
      <div class="progress-steps" id="steps-${id}">
        <span class="step-pill" id="step-captcha-${id}">🔐 Captcha</span>
        <span class="step-pill" id="step-create-${id}">🎵 Creating</span>
        <span class="step-pill" id="step-poll-${id}">⏳ Rendering</span>
      </div>
      <div class="log-box" id="log-${id}"></div>
      <div id="result-${id}"></div>
    `;
    wrap.insertBefore(el, wrap.firstChild);

    startPolling(id);
  }

  // ── Polling ───────────────────────────────────────────────
  function startPolling(id) {
    const timer = setInterval(async () => {
      try {
        const resp = await fetch('/api/status/' + id);
        const data = await resp.json();
        updateCard(id, data);
        if (['ok', 'failed', 'error', 'timeout'].includes(data.status)) {
          clearInterval(timer);
        }
      } catch (_) {}
    }, 2000);
  }

  function updateCard(id, data) {
    const el    = document.getElementById('job-' + id);
    const badge = document.getElementById('badge-' + id);
    const logEl = document.getElementById('log-' + id);
    const resEl = document.getElementById('result-' + id);

    // Badge
    if (badge) {
      badge.className = 'status-badge badge-' + data.status;
      badge.textContent = cap(data.status);
    }

    // Card border
    if (el) {
      el.className = 'job-item status-' + data.status;
    }

    // Progress pills
    updatePills(id, data);

    // Logs
    if (logEl && data.logs) {
      logEl.innerHTML = data.logs.map(line => {
        let cls = 'log-line';
        const l = line.toLowerCase();
        if (l.includes('[captcha]')) cls += ' log-captcha';
        else if (l.includes('[poll]')) cls += ' log-poll';
        else if (l.includes('[create]')) cls += ' log-create';
        if (l.includes('ready') || l.includes('✓') || l.includes('success')) cls += ' log-ok';
        if (l.includes('fail') || l.includes('error') || l.includes('rate limit')) cls += ' log-error';
        return `<div class="${cls}">${esc(line)}</div>`;
      }).join('');
      logEl.scrollTop = logEl.scrollHeight;
    }

    // Audio result
    if (data.status === 'ok' && data.audio_url && resEl && !resEl.hasChildNodes()) {
      resEl.innerHTML = `
        <div class="audio-wrap">
          <div class="ready-label">✓ Song ready!</div>
          <audio controls src="${esc(data.audio_url)}"></audio>
          <br/>
          <a class="audio-url" href="${esc(data.audio_url)}" target="_blank" rel="noopener">
            ${esc(data.audio_url)}
          </a>
        </div>`;
    }

    // Error message
    if (data.error && logEl) {
      const already = logEl.querySelector('.error-final');
      if (!already) {
        const d = document.createElement('div');
        d.className = 'log-line log-error error-final';
        d.textContent = 'Error: ' + data.error;
        logEl.appendChild(d);
        logEl.scrollTop = logEl.scrollHeight;
      }
    }
  }

  function updatePills(id, data) {
    const logs = (data.logs || []).join('\n').toLowerCase();
    const status = data.status;

    const captchaPill = document.getElementById('step-captcha-' + id);
    const createPill  = document.getElementById('step-create-' + id);
    const pollPill    = document.getElementById('step-poll-' + id);

    if (!captchaPill) return;

    const captchaDone = logs.includes('[captcha] token obtained');
    const captchaFail = logs.includes('captcha') && (status === 'error');
    const createDone  = logs.includes('queued successfully');
    const pollDone    = status === 'ok';
    const pollActive  = logs.includes('[poll]') && !pollDone;
    const createActive = captchaDone && !createDone;

    captchaPill.className = 'step-pill' +
      (captchaFail ? ' failed' : captchaDone ? ' done' : ' active');

    createPill.className = 'step-pill' +
      (createDone ? ' done' : createActive ? ' active' : '');

    pollPill.className = 'step-pill' +
      (pollDone ? ' done' : pollActive ? ' active' : '');
  }

  function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>

</body>
</html>
