<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>musichero.ai Generator</title>
  <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0b0b14;
      --surface: #131324;
      --card:    #18182e;
      --border:  #252540;
      --accent:  #7c3aed;
      --accent2: #a855f7;
      --green:   #22c55e;
      --red:     #ef4444;
      --yellow:  #f59e0b;
      --blue:    #60a5fa;
      --text:    #e2e8f0;
      --muted:   #8b8ba8;
      --r:       12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #160830 0%, #0b0b14 65%);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex; align-items: center; gap: 14px;
    }
    .logo {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    header h1 { font-size: 19px; font-weight: 700; }
    header p  { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 22px;
      max-width: 1160px;
      margin: 26px auto;
      padding: 0 22px;
    }
    @media (max-width: 820px) { .layout { grid-template-columns: 1fr; } }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 22px;
    }
    .card-title {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.2px;
      color: var(--muted); margin-bottom: 18px;
    }

    /* ── Form ── */
    label {
      display: block; font-size: 13px;
      color: var(--muted); margin-bottom: 6px; margin-top: 16px;
    }
    label:first-of-type { margin-top: 0; }
    input[type="text"], textarea {
      width: 100%;
      background: #0e0e20;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text); font-size: 14px;
      padding: 10px 12px; outline: none; resize: vertical;
      transition: border-color .2s;
    }
    input[type="text"]:focus, textarea:focus { border-color: var(--accent2); }
    textarea { min-height: 80px; }
    #lyricsInput { min-height: 120px; font-family: monospace; font-size: 13px; }

    .mode-tabs {
      display: flex; background: #0e0e20;
      border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
    }
    .mode-tabs button {
      flex: 1; border: none; background: none;
      color: var(--muted); font-size: 14px; padding: 9px;
      cursor: pointer; transition: background .15s, color .15s;
    }
    .mode-tabs button.active { background: var(--accent); color: #fff; }

    #generateBtn {
      width: 100%; margin-top: 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 10px;
      color: #fff; font-size: 16px; font-weight: 700;
      padding: 13px; cursor: pointer;
      transition: opacity .2s, transform .1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    #generateBtn:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); }
    #generateBtn:disabled { opacity: .45; cursor: not-allowed; transform: none; }

    /* ── Captcha Modal ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 999;
      background: rgba(0,0,0,.75);
      backdrop-filter: blur(4px);
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal-box {
      background: #1a1a32;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 28px;
      width: 340px;
      text-align: center;
      box-shadow: 0 24px 60px rgba(0,0,0,.6);
      animation: popIn .2s ease;
    }
    @keyframes popIn {
      from { transform: scale(.92); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .modal-icon { font-size: 36px; margin-bottom: 14px; }
    .modal-title {
      font-size: 17px; font-weight: 700; margin-bottom: 6px;
    }
    .modal-sub {
      font-size: 13px; color: var(--muted); margin-bottom: 22px; line-height: 1.5;
    }

    #captchaWidget {
      display: flex; justify-content: center; margin-bottom: 16px;
      min-height: 78px;
    }

    .modal-status {
      font-size: 13px; color: var(--muted); min-height: 20px;
    }
    .modal-status.ok    { color: var(--green); }
    .modal-status.error { color: var(--red); }

    .modal-cancel {
      margin-top: 16px; background: none; border: none;
      color: var(--muted); font-size: 13px; cursor: pointer;
      text-decoration: underline;
    }
    .modal-cancel:hover { color: var(--text); }

    /* ── Jobs panel ── */
    .jobs-empty {
      text-align: center; padding: 60px 20px;
      color: var(--muted); font-size: 14px;
    }
    .jobs-empty .icon { font-size: 48px; display: block; margin-bottom: 12px; }

    .job-item {
      background: #0e0e20; border: 1px solid var(--border);
      border-radius: 10px; padding: 18px; margin-bottom: 14px;
      transition: border-color .3s;
    }
    .job-item.status-ok     { border-color: #1a3a1a; }
    .job-item.status-error,
    .job-item.status-failed { border-color: #3a1a1a; }

    .job-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 12px;
    }
    .job-title { font-weight: 600; font-size: 14px; word-break: break-word; }
    .job-meta  { font-size: 12px; color: var(--muted); margin-top: 3px; }

    .status-badge {
      font-size: 11px; font-weight: 700; padding: 3px 10px;
      border-radius: 20px; text-transform: uppercase; letter-spacing: .5px;
      flex-shrink: 0; margin-left: 10px;
    }
    .badge-queued  { background: #1e2a1e; color: var(--yellow); }
    .badge-running { background: #1a2035; color: var(--blue); }
    .badge-ok      { background: #1a3a1a; color: var(--green); }
    .badge-failed,
    .badge-error   { background: #3a1a1a; color: var(--red); }
    .badge-timeout { background: #2a2a10; color: var(--yellow); }

    .progress-steps {
      display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap;
    }
    .step-pill {
      font-size: 11px; padding: 3px 10px; border-radius: 20px;
      background: #1a1a30; color: var(--muted); border: 1px solid var(--border);
      transition: all .3s;
    }
    .step-pill.active { background: #1a2035; color: var(--blue); border-color: var(--blue); }
    .step-pill.done   { background: #1a3a1a; color: var(--green); border-color: #1a4a1a; }
    .step-pill.failed { background: #3a1a1a; color: var(--red); border-color: #4a1a1a; }

    .log-box {
      background: #06060e; border: 1px solid #1a1a30; border-radius: 7px;
      padding: 10px 12px;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 12px; color: var(--muted);
      max-height: 180px; overflow-y: auto; line-height: 1.65;
    }
    .log-line { white-space: pre-wrap; word-break: break-all; }
    .log-poll   { color: var(--blue); }
    .log-create { color: #fcd34d; }
    .log-ok     { color: var(--green); font-weight: 600; }
    .log-error  { color: var(--red); }

    .audio-wrap {
      margin-top: 14px; background: #0a160a;
      border: 1px solid #1a3a1a; border-radius: 8px; padding: 14px;
    }
    .audio-wrap .ready-label {
      font-size: 13px; color: var(--green); font-weight: 600;
      margin-bottom: 10px;
    }
    audio { width: 100%; border-radius: 6px; margin-top: 6px; }
    .audio-url {
      display: inline-block; margin-top: 8px;
      font-size: 11px; color: #a5b4fc; word-break: break-all; text-decoration: none;
    }
    .audio-url:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <div class="logo">🎵</div>
  <div>
    <h1>musichero.ai Generator</h1>
    <p>Generate AI music — just describe your song and solve the captcha</p>
  </div>
</header>

<div class="layout">

  <!-- ═══ LEFT: FORM ═══ -->
  <div>
    <div class="card">
      <div class="card-title">Song Settings</div>

      <label>Mode</label>
      <div class="mode-tabs">
        <button id="btnSimple" class="active" onclick="setMode('simple')">Simple</button>
        <button id="btnCustom" onclick="setMode('custom')">Custom</button>
      </div>

      <label for="promptInput">Style / Mood</label>
      <textarea id="promptInput"
        placeholder="e.g. Upbeat electronic pop with dreamy synths and female vocals"></textarea>

      <div id="customFields" style="display:none">
        <label for="titleInput">Song Title</label>
        <input type="text" id="titleInput" placeholder="My Song" />

        <label for="lyricsInput">Lyrics</label>
        <textarea id="lyricsInput"
          placeholder="[Verse 1]&#10;Your lyrics here...&#10;&#10;[Chorus]&#10;..."></textarea>
      </div>

      <button id="generateBtn" onclick="onGenerate()">
        ✨ Generate Song
      </button>
    </div>
  </div>

  <!-- ═══ RIGHT: JOBS ═══ -->
  <div>
    <div class="card" style="min-height: 320px;">
      <div class="card-title">Generation Jobs</div>
      <div id="jobsWrap">
        <div class="jobs-empty">
          <span class="icon">🎶</span>
          No jobs yet — describe your song and click <strong>Generate Song</strong>.
        </div>
      </div>
    </div>
  </div>

</div>

<!-- ═══ CAPTCHA MODAL ═══ -->
<div class="modal-overlay" id="captchaModal">
  <div class="modal-box">
    <div class="modal-icon">🔐</div>
    <div class="modal-title">Verify you are human</div>
    <div class="modal-sub">Solve the captcha below — song generation will start automatically when done.</div>

    <div id="captchaWidget"></div>

    <div class="modal-status" id="modalStatus"></div>
    <button class="modal-cancel" onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>
  const SITEKEY = '6520ce9c-a8b2-4cbe-b698-687e90448dec';
  let mode = 'simple';
  let captchaWidgetId = null;
  let pendingFormData = null;

  // ── Mode toggle ──
  function setMode(m) {
    mode = m;
    document.getElementById('btnSimple').classList.toggle('active', m === 'simple');
    document.getElementById('btnCustom').classList.toggle('active', m === 'custom');
    document.getElementById('customFields').style.display = m === 'custom' ? 'block' : 'none';
  }

  // ── Generate button clicked ──
  function onGenerate() {
    const prompt = document.getElementById('promptInput').value.trim();
    if (!prompt) {
      document.getElementById('promptInput').focus();
      document.getElementById('promptInput').style.borderColor = 'var(--red)';
      setTimeout(() => document.getElementById('promptInput').style.borderColor = '', 1500);
      return;
    }

    pendingFormData = {
      mode,
      prompt,
      title:  document.getElementById('titleInput').value.trim() || 'Untitled',
      lyrics: document.getElementById('lyricsInput').value.trim(),
    };

    openModal();
  }

  // ── Modal control ──
  function openModal() {
    document.getElementById('captchaModal').classList.add('open');
    document.getElementById('modalStatus').textContent = '';
    document.getElementById('modalStatus').className = 'modal-status';

    // Render hCaptcha widget once API is loaded
    renderCaptcha();
  }

  function closeModal() {
    document.getElementById('captchaModal').classList.remove('open');
    pendingFormData = null;
    if (captchaWidgetId !== null && window.hcaptcha) {
      try { hcaptcha.reset(captchaWidgetId); } catch(_) {}
    }
  }

  function renderCaptcha() {
    const container = document.getElementById('captchaWidget');
    container.innerHTML = '';

    if (window.hcaptcha) {
      captchaWidgetId = hcaptcha.render(container, {
        sitekey:  SITEKEY,
        theme:    'dark',
        callback: onCaptchaSolved,
        'error-callback': onCaptchaError,
        'expired-callback': onCaptchaExpired,
      });
    } else {
      // API not loaded yet — wait and retry
      setTimeout(renderCaptcha, 300);
    }
  }

  // ── Captcha callbacks ──
  function onCaptchaSolved(token) {
    const status = document.getElementById('modalStatus');
    status.className = 'modal-status ok';
    status.textContent = '✓ Captcha solved — submitting...';

    // Small delay so user sees the confirmation
    setTimeout(() => {
      closeModal();
      submitJob(token);
    }, 600);
  }

  function onCaptchaError() {
    const status = document.getElementById('modalStatus');
    status.className = 'modal-status error';
    status.textContent = 'Captcha error — please try again.';
    if (window.hcaptcha && captchaWidgetId !== null) {
      hcaptcha.reset(captchaWidgetId);
    }
  }

  function onCaptchaExpired() {
    const status = document.getElementById('modalStatus');
    status.className = 'modal-status error';
    status.textContent = 'Captcha expired — please solve again.';
    if (window.hcaptcha && captchaWidgetId !== null) {
      hcaptcha.reset(captchaWidgetId);
    }
  }

  // ── Submit to backend ──
  async function submitJob(token) {
    if (!pendingFormData) return;
    const body = { ...pendingFormData, captcha_token: token };

    const btn = document.getElementById('generateBtn');
    btn.disabled = true;
    btn.textContent = 'Submitting...';

    try {
      const resp = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await resp.json();
      if (!resp.ok) { alert('Error: ' + (data.error || resp.statusText)); return; }
      addJobCard(data.job_id, body);
    } catch (err) {
      alert('Request failed: ' + err.message);
    } finally {
      btn.disabled = false;
      btn.innerHTML = '✨ Generate Song';
      pendingFormData = null;
    }
  }

  // ── Job card ──
  function addJobCard(id, body) {
    const wrap = document.getElementById('jobsWrap');
    const empty = wrap.querySelector('.jobs-empty');
    if (empty) empty.remove();

    const label = body.mode === 'custom'
      ? (body.title || 'Custom Song')
      : body.prompt.slice(0, 60);

    const el = document.createElement('div');
    el.className = 'job-item';
    el.id = 'job-' + id;
    el.innerHTML = `
      <div class="job-header">
        <div>
          <div class="job-title">${esc(label)}</div>
          <div class="job-meta">Mode: ${body.mode} &nbsp;·&nbsp; ${new Date().toLocaleTimeString()}</div>
        </div>
        <span class="status-badge badge-queued" id="badge-${id}">Queued</span>
      </div>
      <div class="progress-steps" id="steps-${id}">
        <span class="step-pill done">✓ Captcha</span>
        <span class="step-pill" id="step-create-${id}">🎵 Creating</span>
        <span class="step-pill" id="step-poll-${id}">⏳ Rendering</span>
      </div>
      <div class="log-box" id="log-${id}"></div>
      <div id="result-${id}"></div>
    `;
    wrap.insertBefore(el, wrap.firstChild);
    startPolling(id);
  }

  // ── Polling ──
  function startPolling(id) {
    const timer = setInterval(async () => {
      try {
        const resp = await fetch('/api/status/' + id);
        const data = await resp.json();
        updateCard(id, data);
        if (['ok', 'failed', 'error', 'timeout'].includes(data.status)) {
          clearInterval(timer);
        }
      } catch (_) {}
    }, 2000);
  }

  function updateCard(id, data) {
    const el      = document.getElementById('job-' + id);
    const badge   = document.getElementById('badge-' + id);
    const logEl   = document.getElementById('log-' + id);
    const resEl   = document.getElementById('result-' + id);
    const createP = document.getElementById('step-create-' + id);
    const pollP   = document.getElementById('step-poll-' + id);

    if (badge) {
      badge.className = 'status-badge badge-' + data.status;
      badge.textContent = cap(data.status);
    }
    if (el) el.className = 'job-item status-' + data.status;

    const logs = (data.logs || []).join('\n').toLowerCase();
    const createDone = logs.includes('queued successfully');
    const pollActive = logs.includes('[poll]') && data.status === 'running';

    if (createP) createP.className = 'step-pill' + (createDone ? ' done' : data.status === 'running' && !createDone ? ' active' : '');
    if (pollP)   pollP.className   = 'step-pill' + (data.status === 'ok' ? ' done' : pollActive ? ' active' : '');

    if (logEl && data.logs) {
      logEl.innerHTML = data.logs.map(line => {
        let cls = 'log-line';
        const l = line.toLowerCase();
        if (l.includes('[poll]'))   cls += ' log-poll';
        if (l.includes('[create]')) cls += ' log-create';
        if (l.includes('ready') || l.includes('✓')) cls += ' log-ok';
        if (l.includes('fail') || l.includes('error')) cls += ' log-error';
        return `<div class="${cls}">${esc(line)}</div>`;
      }).join('');
      logEl.scrollTop = logEl.scrollHeight;
    }

    if (data.status === 'ok' && data.audio_url && resEl && !resEl.hasChildNodes()) {
      resEl.innerHTML = `
        <div class="audio-wrap">
          <div class="ready-label">✓ Song ready!</div>
          <audio controls src="${esc(data.audio_url)}"></audio>
          <br/>
          <a class="audio-url" href="${esc(data.audio_url)}" target="_blank" rel="noopener">
            ${esc(data.audio_url)}
          </a>
        </div>`;
    }

    if (data.error && logEl && !logEl.querySelector('.err-final')) {
      const d = document.createElement('div');
      d.className = 'log-line log-error err-final';
      d.textContent = 'Error: ' + data.error;
      logEl.appendChild(d);
      logEl.scrollTop = logEl.scrollHeight;
    }
  }

  function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>

</body>
</html>
